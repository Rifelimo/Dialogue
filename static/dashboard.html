<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialogue - Colaboração entre Agentes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .message-enter { animation: slideIn 0.2s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .agent-user { background: #dbeafe; color: #1e40af; }
        .agent-claude { background: #fce7f3; color: #9d174d; }
        .agent-codex { background: #d1fae5; color: #065f46; }
        .typing span {
            animation: bounce 1.4s infinite ease-in-out both;
            display: inline-block; width: 6px; height: 6px;
            background: #9ca3af; border-radius: 50%; margin: 0 2px;
        }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">
    <header class="bg-white border-b px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-gray-800">Dialogue</h1>
            <span id="status" class="text-sm text-gray-500">A ligar...</span>
        </div>
        <div class="flex items-center gap-3">
            <div id="agents" class="flex gap-2 text-sm"></div>
            <button onclick="newConversation()" class="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600">
                Nova Conversa
            </button>
        </div>
    </header>

    <div class="flex-1 flex flex-col overflow-hidden">
        <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        
        <div id="typing" class="hidden px-4 py-2 text-sm text-gray-500">
            <span class="typing"><span></span><span></span><span></span></span>
            <span id="typingAgent"></span> está a escrever...
        </div>

        <div class="bg-white border-t p-4">
            <div class="flex gap-2 mb-2">
                <select id="to" class="text-sm border rounded px-2 py-1">
                    <option value="all">@todos</option>
                    <option value="claude">@claude</option>
                    <option value="codex">@codex</option>
                </select>
            </div>
            <div class="flex gap-2">
                <input type="text" id="input" placeholder="Escreve uma mensagem..." 
                    class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    onkeypress="if(event.key==='Enter')send()">
                <button onclick="send()" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600">
                    Enviar
                </button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let messages = [];

        function connect() {
            ws = new WebSocket(`ws://${location.host}/ws/user`);
            
            ws.onopen = () => {
                document.getElementById('status').textContent = '🟢 Ligado';
                document.getElementById('status').className = 'text-sm text-green-600';
                load();
            };
            
            ws.onclose = () => {
                document.getElementById('status').textContent = '🔴 Desligado';
                document.getElementById('status').className = 'text-sm text-red-600';
                setTimeout(connect, 2000);
            };
            
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.event === 'new_message') {
                    if (!messages.find(m => m.id === msg.data.id)) {
                        messages.push(msg.data);
                        render();
                    }
                } else if (msg.event === 'typing' && msg.data.agent_id !== 'user') {
                    showTyping(msg.data.agent_id);
                } else if (msg.event === 'agent_joined' || msg.event === 'agent_left') {
                    loadAgents();
                }
            };
        }

        async function load() {
            const r = await fetch('/api/messages');
            const data = await r.json();
            messages = data.messages;
            render();
            loadAgents();
        }

        async function loadAgents() {
            const r = await fetch('/api/agents');
            const data = await r.json();
            document.getElementById('agents').innerHTML = data.agents
                .filter(a => a.id !== 'user')
                .map(a => `<span class="flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full ${a.status === 'online' ? 'bg-green-500' : 'bg-gray-400'}"></span>
                    ${a.name}
                </span>`).join('');
        }

        function render() {
            const container = document.getElementById('messages');
            if (messages.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8">Nova conversa. Escreve algo para começar.</div>';
                return;
            }
            
            container.innerHTML = messages.map(m => {
                const isUser = m.from === 'user';
                const badge = m.from === 'user' ? 'agent-user' : m.from === 'claude' ? 'agent-claude' : 'agent-codex';
                const time = new Date(m.timestamp).toLocaleTimeString('pt-PT', {hour: '2-digit', minute: '2-digit'});
                const toLabel = m.to !== 'all' ? `<span class="text-xs text-gray-400">→ @${m.to}</span>` : '';
                
                return `<div class="message-enter ${isUser ? 'flex justify-end' : ''}">
                    <div class="max-w-xl ${isUser ? 'bg-blue-500 text-white' : 'bg-white'} rounded-lg shadow px-4 py-3">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-xs font-medium px-2 py-0.5 rounded-full ${badge}">${m.from}</span>
                            ${toLabel}
                            <span class="text-xs ${isUser ? 'text-blue-200' : 'text-gray-400'}">${time}</span>
                        </div>
                        <div class="whitespace-pre-wrap">${escapeHtml(m.content)}</div>
                    </div>
                </div>`;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('input');
            const content = input.value.trim();
            if (!content) return;
            
            const to = document.getElementById('to').value;
            
            await fetch('/api/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({from: 'user', to, type: 'chat', content})
            });
            
            input.value = '';
        }

        async function newConversation() {
            if (messages.length > 0 && !confirm('Limpar conversa e começar de novo?')) return;
            await fetch('/api/clear', {method: 'POST'});
            messages = [];
            render();
        }

        let typingTimeout;
        function showTyping(agent) {
            document.getElementById('typing').classList.remove('hidden');
            document.getElementById('typingAgent').textContent = agent;
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                document.getElementById('typing').classList.add('hidden');
            }, 3000);
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        connect();
    </script>
</body>
</html>
